<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lane Paradox</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

    :root {
      --page-top: #f4f9ef;
      --page-mid: #d8ecde;
      --page-bottom: #85b8b1;
      --shell: rgba(239, 248, 242, 0.84);
      --shell-strong: rgba(232, 245, 237, 0.92);
      --shell-border: rgba(36, 89, 88, 0.15);
      --panel: rgba(241, 249, 243, 0.82);
      --panel-head: rgba(234, 245, 238, 0.9);
      --canvas-frame: #d6ead8;
      --ink: #23484b;
      --muted: #5f7d7d;
      --accent: #1d8572;
      --accent-soft: #40a291;
      --warm: #c66d42;
      --warm-deep: #a95534;
      --success: #2d8a61;
      --danger: #b95c53;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: radial-gradient(circle at top center, rgba(255, 255, 255, .92) 0%, rgba(255, 255, 255, 0) 32%), radial-gradient(circle at 14% 18%, rgba(83, 163, 142, .18) 0%, rgba(83, 163, 142, 0) 28%), linear-gradient(180deg, var(--page-top) 0%, var(--page-mid) 34%, var(--page-bottom) 100%);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .hdr {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--shell-border);
      background: var(--shell);
      flex-shrink: 0;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 12px 32px rgba(30, 82, 83, .12);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px)
    }

    .hdr h1 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #2d6769
    }

    .hdr h1 b {
      color: var(--warm);
      font-weight: 700
    }

    .ctrls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap
    }

    .cg {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .cg input[type=range] {
      width: 55px;
      accent-color: var(--accent);
      height: 2px
    }

    .cg input[type=number] {
      width: 40px;
      background: rgba(255, 255, 255, .62);
      border: 1px solid rgba(53, 105, 102, .22);
      color: var(--ink);
      padding: 2px 4px;
      font-family: inherit;
      font-size: 9px;
      border-radius: 2px;
      text-align: center
    }

    .cv {
      color: #3d6668;
      min-width: 18px;
      text-align: center;
      font-size: 9px
    }

    .sep {
      width: 1px;
      height: 16px;
      background: rgba(44, 99, 97, .18)
    }

    .btn {
      background: linear-gradient(180deg, rgba(255, 255, 255, .45) 0%, rgba(232, 245, 238, .72) 100%);
      border: 1px solid rgba(44, 104, 99, .22);
      color: #355f62;
      font-family: inherit;
      font-size: 9px;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 999px;
      transition: all .15s;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(33, 84, 82, .06)
    }

    .btn:hover {
      border-color: rgba(29, 133, 114, .45);
      color: #1e5554;
      background: rgba(255, 255, 255, .76)
    }

    .bp {
      border-color: rgba(31, 116, 95, .32);
      color: var(--success)
    }

    .bp:hover {
      border-color: rgba(31, 116, 95, .48);
      color: #166045;
      background: rgba(45, 138, 97, .08)
    }

    .bp.on {
      border-color: rgba(169, 111, 52, .36);
      color: var(--warm);
      background: rgba(198, 109, 66, .12)
    }

    .br {
      border-color: rgba(185, 92, 83, .28);
      color: var(--danger)
    }

    .br:hover {
      border-color: rgba(185, 92, 83, .42);
      color: #963b36;
      background: rgba(185, 92, 83, .08)
    }

    .sim {
      flex: 1;
      display: flex;
      padding: 12px;
      gap: 12px;
      min-height: 0;
      overflow: auto
    }

    .sc {
      flex: 0 0 auto;
      min-width: 160px;
      min-height: 240px;
      width: calc(33.3% - 8px);
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--shell-border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 18px 40px rgba(30, 79, 79, .12);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px)
    }

    .sc-h {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid var(--shell-border);
      background: linear-gradient(180deg, rgba(245, 250, 246, .95) 0%, var(--panel-head) 100%);
      flex-shrink: 0
    }

    .sc-ln {
      display: flex;
      align-items: center;
      gap: 3px
    }

    .lb {
      background: rgba(255, 255, 255, .35);
      border: 1px solid rgba(54, 105, 103, .2);
      color: #4d7476;
      font-family: inherit;
      font-size: 9px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s
    }

    .lb:hover {
      border-color: rgba(29, 133, 114, .38);
      color: #245d60
    }

    .lx {
      background: rgba(255, 255, 255, .28);
      border: 1px solid rgba(185, 92, 83, .24);
      color: #8b4a44;
      font-family: inherit;
      font-size: 11px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      margin-left: 4px
    }

    .lx:hover {
      border-color: rgba(185, 92, 83, .44);
      color: #a33f39;
      background: rgba(185, 92, 83, .08)
    }

    .sc-lbl {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #456d70;
      padding: 0 4px
    }

    .tmr {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--warm);
      letter-spacing: .5px;
      transition: color .3s;
      text-shadow: 0 2px 0 rgba(255, 255, 255, .25)
    }

    .tmr.done {
      color: var(--success)
    }

    .tmr.wait {
      color: #7aa1a0
    }

    .rank {
      position: absolute;
      top: 34px;
      right: 8px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 2px;
      display: none;
      z-index: 5
    }

    .rank.show {
      display: block
    }

    .r1 {
      background: #e6f3e8;
      color: var(--success);
      border: 1px solid rgba(45, 138, 97, .24)
    }

    .r2 {
      background: #e2f0f4;
      color: #397598;
      border: 1px solid rgba(57, 117, 152, .22)
    }

    .r3 {
      background: #f6ede3;
      color: var(--warm-deep);
      border: 1px solid rgba(169, 111, 52, .24)
    }

    .rx {
      background: rgba(225, 239, 236, .75);
      color: #547173;
      border: 1px solid rgba(67, 111, 108, .18)
    }

    .cw {
      flex: 1;
      position: relative;
      min-height: 0;
      min-height: 150px;
      background: linear-gradient(180deg, var(--canvas-frame) 0%, #c5e0d2 100%)
    }

    @media (max-height: 430px) {
      .sc {
        min-height: 280px
      }

      .cw {
        min-height: 180px
      }
    }

    .cw canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%
    }

    .add {
      min-width: 28px;
      max-width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(240, 248, 243, .58);
      border: 1px dashed rgba(47, 103, 102, .24);
      border-radius: 10px;
      cursor: pointer;
      color: #5b8988;
      font-size: 16px;
      transition: all .2s;
      flex-shrink: 0
    }

    .add:hover {
      border-color: rgba(29, 133, 114, .4);
      color: #2f6464;
      background: rgba(255, 255, 255, .68)
    }

    .ftr {
      padding: 5px 20px;
      border-top: 1px solid var(--shell-border);
      background: rgba(236, 245, 239, .78);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 8px;
      color: #587474;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px)
    }

    .dt {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: middle
    }

    .dl {
      background: #c48828
    }

    .dr {
      background: #2888c4
    }
  </style>
</head>

<body>
  <div class="hdr">
    <h1>The Lane <b>Paradox</b></h1>
    <div class="ctrls">
        <div class="cg"><label for="nCars">Cars</label><input type="number" id="nCars" value="8" min="2" title="Number of cars"></div>
        <div class="cg"><label for="split">Left%</label><input type="range" id="split" min="0" max="100" value="50" step="5" title="Share of cars that want the left branch"><span
          class="cv" id="splitV">50</span></div>
        <div class="cg"><label for="spd">Speed</label><input type="range" id="spd" min="0.3" max="3" value="1" step="0.1" title="Simulation speed"><span
          class="cv" id="spdV">1.0x</span></div>
      <div class="cg"><label for="themeSelect">Theme</label><select id="themeSelect" title="Visual theme">
          <option value="classic">Clássico</option>
          <option value="rioSatellite" selected>Rio Satélite</option>
          <option value="cityNature">Cidade &amp; Natureza</option>
        </select></div>
      <div class="sep"></div>
      <button class="btn bp" id="bPlay">Play</button>
      <button class="btn br" id="bReset">Reset</button>
    </div>
  </div>
  <div class="sim" id="simC"></div>
  <div class="ftr"><span><span class="dt dl"></span>wants left</span><span><span class="dt dr"></span>wants
      right</span><span>bicycle - cone detection - reservations - blinkers</span></div>

  <script src="traffic_core.js"></script>
  <script>
    const { Sim, Ren, V0_DEF, RENDER_THEMES } = window.TrafficCore;
    const MIN_LOGICAL_CANVAS_W = 220;
    const MIN_LOGICAL_CANVAS_H = 260;
    let scenarios = [{ lanes: 1 }, { lanes: 2 }, { lanes: 3 }], sims = [], rens = [], cvs = [];
    let anim = null, gRun = false, gSeed = 42, lastT = 0, finishOrder = [];
    const $ = id => document.getElementById(id);
    function getP() { return { v0: V0_DEF }; }
    function logicalCanvasSize(cv) {
      const d = devicePixelRatio || 1;
      return {
        w: Math.max(cv.width / d, MIN_LOGICAL_CANVAS_W),
        h: Math.max(cv.height / d, MIN_LOGICAL_CANVAS_H)
      };
    }
    function build() {
      const c = $('simC'); c.innerHTML = ''; sims = []; rens = []; cvs = []; finishOrder = [];
      scenarios.forEach((sc, i) => {
        const d = document.createElement('div'); d.className = 'sc'; d.id = `sc${i}`;
        d.innerHTML = `<div class="sc-h"><div class="sc-ln"><button class="lb" data-i="${i}" data-d="-1">-</button><span class="sc-lbl" id="l${i}">${sc.lanes} Lane${sc.lanes > 1 ? 's' : ''}</span><button class="lb" data-i="${i}" data-d="1">+</button><button class="lx" data-rm="${i}">x</button></div><div class="tmr wait" id="t${i}">0.00s</div></div><span class="rank" id="r${i}"></span><div class="cw" id="w${i}"><canvas id="c${i}"></canvas></div>`;
        c.appendChild(d);
      });
      const ab = document.createElement('div'); ab.className = 'add'; ab.textContent = '+';
      ab.onclick = () => { scenarios.push({ lanes: (Math.max(...scenarios.map(s => s.lanes)) || 0) + 1 }); rebuild(); }; c.appendChild(ab);
      c.querySelectorAll('.lb').forEach(b => { b.onclick = () => { const i = +b.dataset.i, d = +b.dataset.d; scenarios[i].lanes = Math.max(1, Math.min(8, scenarios[i].lanes + d)); rebuild(); }; });
      c.querySelectorAll('.lx').forEach(b => { b.onclick = () => { const i = +b.dataset.rm; if (scenarios.length > 1) { scenarios.splice(i, 1); rebuild(); } }; });
      resize(); initSims(); renderAll();
    }
    function resize() { scenarios.forEach((_, i) => { const wr = $(`w${i}`), cv = $(`c${i}`); if (!wr || !cv) return; const r = wr.getBoundingClientRect(), d = devicePixelRatio || 1; cv.width = r.width * d; cv.height = r.height * d; cv.getContext('2d').scale(d, d); cvs[i] = cv; }); }
    function initSims() {
      const nc = Math.max(2, parseInt($('nCars').value) || 8), sp = parseInt($('split').value) || 50;
      sims = scenarios.map((sc, i) => { const s = new Sim(sc.lanes, nc, sp, gSeed + i); const cv = cvs[i]; if (cv) { const logical = logicalCanvasSize(cv); s.init(logical.w, logical.h); } return s; });
      const selTheme = ($('themeSelect') || {}).value || 'rioSatellite';
      rens = sims.map((s, i) => new Ren(cvs[i], s, { theme: selTheme }));
    }
    function renderAll() { rens.forEach(r => r.draw()); sims.forEach((s, i) => { const el = $(`t${i}`); if (!el) return; el.textContent = s.timerSec.toFixed(2) + 's'; el.className = 'tmr' + (s.finished ? ' done' : (!s.started ? ' wait' : '')); }); }
    function updateRanks() { sims.forEach((s, i) => { if (s.finished && !finishOrder.includes(i)) finishOrder.push(i); }); const lb = ['1st', '2nd', '3rd', '4th', '5th', '6th']; sims.forEach((_, i) => { const el = $(`r${i}`); if (!el) return; const ri = finishOrder.indexOf(i); if (ri >= 0) { el.textContent = lb[ri] || `#${ri + 1}`; el.className = `rank show ${ri < 3 ? 'r' + (ri + 1) : 'rx'}`; } }); }
    function rebuild() { cancelAnimationFrame(anim); gRun = false; $('bPlay').textContent = 'Play'; $('bPlay').classList.remove('on'); build(); }
    function animate(time) { if (!gRun) return; const raw = lastT ? Math.min((time - lastT) / 16.67, 3) : 0; lastT = time; const dt = raw * (parseFloat($('spd').value) || 1), P = getP(); sims.forEach(s => s.tick(dt, P)); renderAll(); updateRanks(); if (sims.every(s => s.finished)) { gRun = false; $('bPlay').textContent = 'Play'; $('bPlay').classList.remove('on'); } if (gRun) anim = requestAnimationFrame(animate); }
    $('bPlay').onclick = () => { if (gRun) { gRun = false; $('bPlay').textContent = 'Play'; $('bPlay').classList.remove('on'); cancelAnimationFrame(anim); } else { if (!sims.some(s => s.started)) sims.forEach(s => s.start()); gRun = true; lastT = 0; $('bPlay').textContent = 'Pause'; $('bPlay').classList.add('on'); anim = requestAnimationFrame(animate); } };
    $('bReset').onclick = () => { gSeed = Math.floor(Math.random() * 1e5); rebuild(); };
    $('split').oninput = e => $('splitV').textContent = e.target.value;
    $('spd').oninput = e => $('spdV').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
    ['nCars', 'split'].forEach(id => { $(id).onchange = () => { if (gRun) { gRun = false; $('bPlay').textContent = 'Play'; $('bPlay').classList.remove('on'); cancelAnimationFrame(anim); } rebuild(); }; });
    window.addEventListener('resize', () => { resize(); rens.forEach(r => r._invalidateSceneBuf()); sims.forEach((s, i) => { const cv = cvs[i]; if (cv) { const logical = logicalCanvasSize(cv); s.init(logical.w, logical.h); } }); renderAll(); });
    $('themeSelect').onchange = e => { const key = e.target.value; const th = RENDER_THEMES[key]; if (!th) return; rens.forEach(r => { r.theme = th; r._invalidateSceneBuf(); }); renderAll(); };
    build();
  </script>
</body>

</html>
